name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
      - run: bun test
      # Validate that a publishable VSIX can be produced.
      - run: bun run package

  publish:
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    # Gate on a GitHub environment so the Azure federated credential can trust a
    # single, stable subject: repo:<owner>/<repo>:environment:release
    environment: release
    permissions:
      # Required for Entra ID (Microsoft) OIDC federation — no PAT is stored.
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      # vsce is a Node CLI and needs Node >= 22; the build itself runs via bun.
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - run: bun install --frozen-lockfile
      - name: Azure login (OIDC / workload identity federation)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          # Marketplace publishing needs no Azure subscription/resources.
          allow-no-subscriptions: true
      - name: Publish to the VS Code Marketplace
        run: ./node_modules/.bin/vsce publish --azure-credential --no-dependencies
